name: Go Coverage Report

on:
  push:
    branches: ["**"]
    paths:
      - "**/*.go"
      - "**/go.mod"
      - "**/go.sum"
      - ".github/workflows/go-coverage-report.yml"
  pull_request:
    paths:
      - "**/*.go"
      - "**/go.mod"
      - "**/go.sum"
      - ".github/workflows/go-coverage-report.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [webserver, api, utils]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Run tests with coverage
        working-directory: ${{ matrix.module }}
        run: go test ./... -covermode=atomic -coverprofile=coverage.out

      - name: Build coverage summary
        working-directory: ${{ matrix.module }}
        run: |
          go tool cover -func=coverage.out | tee coverage-summary.txt

      - name: Publish job summary
        working-directory: ${{ matrix.module }}
        run: |
          {
            echo "## Go coverage report (${PWD##*/})"
            echo
            echo '```text'
            cat coverage-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment coverage on pull request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const moduleName = '${{ matrix.module }}';
            const marker = `<!-- go-coverage-report:${moduleName} -->`;
            const summary = fs.readFileSync(`${moduleName}/coverage-summary.txt`, 'utf8').trim();
            const body = [
              marker,
              `## Go coverage report (${moduleName})`,
              '',
              '```text',
              summary,
              '```',
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
            });

            const existingComment = comments.find((comment) =>
              comment.user.type === 'Bot' && comment.body && comment.body.includes(marker)
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.module }}
          path: |
            ${{ matrix.module }}/coverage.out
            ${{ matrix.module }}/coverage-summary.txt
